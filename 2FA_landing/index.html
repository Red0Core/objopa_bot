<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2FA</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 30px 20px;
      background-color: #fff;
      color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 400px;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 24px;
      font-family: monospace;
      text-align: center;
      outline: none;
    }
    input:focus {
      border-color: #888;
    }
    .otp-display {
      text-align: center;
      margin-bottom: 24px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .otp-code {
      font-size: 42px;
      font-weight: bold;
      letter-spacing: 8px;
      font-family: monospace;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      display: inline-block;
      min-width: 220px;
    }
    .time-left {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }
    .sync-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    button {
      padding: 12px 20px;
      font-size: 15px;
      border: 1px solid #ccc;
      background: #f9f9f9;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
    }
    button:active {
      background: #eee;
    }
    button:disabled {
      opacity: 0.5;
    }
    .drift {
      font-size: 14px;
      color: #666;
      min-height: 20px;
    }
    .copied-msg {
      font-size: 14px;
      color: #2e7d32;
      visibility: hidden;
      margin-top: 8px;
      height: 20px;
    }
    .copied .copied-msg {
      visibility: visible;
    }

    @media (prefers-color-scheme: dark) {
      body { background-color: #121212; color: #e0e0e0; }
      input { background: #1e1e1e; color: #e0e0e0; border-color: #444; }
      input:focus { border-color: #666; }
      .otp-code { background: #1e1e1e; color: #fff; }
      button { background: #2c2c2c; color: #e0e0e0; border-color: #444; }
      button:active { background: #3c3c3c; }
      .time-left, .drift { color: #aaa; }
      .copied-msg { color: #81c784; }
    }
  </style>
</head>
<body>
  <div class="container">
    <input
      id="secret"
      inputmode="text"
      autocomplete="one-time-code"
      placeholder="Секрет (Base32)"
      aria-label="Секрет (Base32)"
    />

    <div class="otp-display" id="otp">
      <div class="otp-code" id="otp-code">------</div>
      <div class="time-left">Осталось: <span id="remaining">30</span> сек</div>
      <div class="copied-msg">Скопировано!</div>
    </div>

    <div class="sync-group">
      <button id="sync-btn" type="button">Проверить время</button>
      <div class="drift" id="drift"></div>
    </div>
  </div>

  <script>
    var otpTag = document.getElementById("otp");
    var otpDigits = document.getElementById("otp-code");
    var remainingTag = document.getElementById("remaining");
    var secretInput = document.getElementById("secret");
    var syncBtn = document.getElementById("sync-btn");
    var driftTag = document.getElementById("drift");

    var pathSegments = window.location.pathname.split("/").filter(Boolean);
    var lastSegment = pathSegments.length ? pathSegments[pathSegments.length - 1] : "";
    var hasExtension = lastSegment.indexOf(".") !== -1;
    var initialPathSecret = pathSegments.length && !hasExtension
      ? decodeURIComponent(lastSegment)
      : "";
    var basePathSegments = initialPathSecret
      ? pathSegments.slice(0, -1)
      : pathSegments.slice();

    var cryptoKey = null;
    var secretBytes = null;
    var isUpdating = false;
    var lastLocalUnix = null;
    var lastSecret = "";

    function resetSecret() {
      cryptoKey = null;
      secretBytes = null;
      lastSecret = "";
    }

    function padStart(value, target, padChar) {
      var str = String(value);
      while (str.length < target) {
        str = padChar + str;
      }
      return str;
    }

    function extractSecretFromUrl() {
      var cleanedPathSecret = initialPathSecret.trim();
      if (cleanedPathSecret) {
        return cleanedPathSecret.replace(/\s+/g, "");
      }

      var params = new URLSearchParams(window.location.search);
      var otpauth = params.get("otpauth");
      if (!otpauth) return null;
      try {
        var url = new URL(otpauth);
        var secret = url.searchParams.get("secret");
        return secret ? secret.replace(/\s+/g, "") : null;
      } catch (error) {
        return null;
      }
    }

    function base32ToBytes(base32String) {
      var base32Alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      var cleaned = base32String.replace(/\s+/g, "");
      var bits = "";
      for (var i = 0; i < cleaned.length; i++) {
        var char = cleaned.charAt(i);
        var value = base32Alphabet.indexOf(char);
        if (value === -1) continue;
        var padded = value.toString(2);
        while (padded.length < 5) padded = "0" + padded;
        bits += padded;
      }
      var bytes = [];
      for (var j = 0; j + 8 <= bits.length; j += 8) {
        bytes.push(parseInt(bits.slice(j, j + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function prepareKey(secret) {
      return new Promise(function (resolve) {
        if (!secret) {
          resetSecret();
          return resolve();
        }

        var bytes = base32ToBytes(secret);
        if (!bytes.length) {
          resetSecret();
          return resolve();
        }

        secretBytes = bytes;
        lastSecret = secret;

        if (!crypto || !crypto.subtle || !crypto.subtle.importKey) {
          cryptoKey = null;
          return resolve();
        }

        crypto.subtle
          .importKey("raw", bytes, { name: "HMAC", hash: "SHA-1" }, false, ["sign"])
          .then(function (key) {
            cryptoKey = key;
            resolve();
          })
          .catch(function () {
            cryptoKey = null;
            resolve();
          });
      });
    }

    function leftRotate(value, bits) {
      return ((value << bits) | (value >>> (32 - bits))) >>> 0;
    }

    function sha1(bytes) {
      var words = [];
      var ml = bytes.length * 8;
      for (var i = 0; i < bytes.length; i++) {
        words[i >> 2] |= bytes[i] << (24 - (i % 4) * 8);
      }
      words[ml >> 5] |= 0x80 << (24 - (ml % 32));
      words[(((ml + 64) >> 9) << 4) + 15] = ml;

      var h0 = 0x67452301;
      var h1 = 0xefcdab89;
      var h2 = 0x98badcfe;
      var h3 = 0x10325476;
      var h4 = 0xc3d2e1f0;

      for (var i = 0; i < words.length; i += 16) {
        var w = words.slice(i, i + 16);
        for (var t = 16; t < 80; t++) {
          w[t] = leftRotate((w[t - 3] ^ w[t - 8] ^ w[t - 14] ^ w[t - 16]) >>> 0, 1);
        }

        var a = h0;
        var b = h1;
        var c = h2;
        var d = h3;
        var e = h4;

        for (var t = 0; t < 80; t++) {
          var f = 0;
          var k = 0;
          if (t < 20) {
            f = (b & c) | (~b & d);
            k = 0x5a827999;
          } else if (t < 40) {
            f = b ^ c ^ d;
            k = 0x6ed9eba1;
          } else if (t < 60) {
            f = (b & c) | (b & d) | (c & d);
            k = 0x8f1bbcdc;
          } else {
            f = b ^ c ^ d;
            k = 0xca62c1d6;
          }

          var temp = (leftRotate(a, 5) + f + e + k + (w[t] >>> 0)) >>> 0;
          e = d;
          d = c;
          c = leftRotate(b, 30);
          b = a;
          a = temp;
        }

        h0 = (h0 + a) >>> 0;
        h1 = (h1 + b) >>> 0;
        h2 = (h2 + c) >>> 0;
        h3 = (h3 + d) >>> 0;
        h4 = (h4 + e) >>> 0;
      }

      var result = new Uint8Array(20);
      var hashParts = [h0, h1, h2, h3, h4];
      for (var i = 0; i < hashParts.length; i++) {
        result[i * 4] = (hashParts[i] >>> 24) & 0xff;
        result[i * 4 + 1] = (hashParts[i] >>> 16) & 0xff;
        result[i * 4 + 2] = (hashParts[i] >>> 8) & 0xff;
        result[i * 4 + 3] = hashParts[i] & 0xff;
      }
      return result;
    }

    function hmacSha1(key, message) {
      var keyBytes = key;
      if (keyBytes.length > 64) {
        keyBytes = sha1(keyBytes);
      }

      var paddedKey = new Uint8Array(64);
      paddedKey.set(keyBytes);

      var oKeyPad = new Uint8Array(64);
      var iKeyPad = new Uint8Array(64);
      for (var i = 0; i < 64; i++) {
        oKeyPad[i] = paddedKey[i] ^ 0x5c;
        iKeyPad[i] = paddedKey[i] ^ 0x36;
      }

      var inner = new Uint8Array(64 + message.length);
      inner.set(iKeyPad, 0);
      inner.set(message, 64);
      var innerHash = sha1(inner);

      var outer = new Uint8Array(64 + innerHash.length);
      outer.set(oKeyPad, 0);
      outer.set(innerHash, 64);

      return sha1(outer);
    }

    function updateUrlWithSecret(secret) {
      var url = new URL(window.location.href);
      var segments = basePathSegments.slice();

      if (secret) {
        segments.push(encodeURIComponent(secret));
      }

      url.pathname = "/" + segments.join("/");
      window.history.replaceState({}, "", url);
    }

    function generateOtp(unixTime) {
      return new Promise(function (resolve) {
        if (!cryptoKey && !secretBytes) return resolve(null);
        var counter = Math.floor(unixTime / 30);
        var buffer = new ArrayBuffer(8);
        var view = new DataView(buffer);
        view.setUint32(4, counter, false);

        function handleHash(hash) {
          if (!hash) return resolve(null);
          var offset = hash[hash.length - 1] & 0x0f;
          var binary =
            ((hash[offset] & 0x7f) << 24) |
            ((hash[offset + 1] & 0xff) << 16) |
            ((hash[offset + 2] & 0xff) << 8) |
            (hash[offset + 3] & 0xff);
          resolve(padStart((binary % 1000000).toString(), 6, "0"));
        }

        if (cryptoKey) {
          crypto.subtle
            .sign("HMAC", cryptoKey, buffer)
            .then(function (signature) {
              handleHash(new Uint8Array(signature));
            })
            .catch(function () {
              resolve(null);
            });
        } else if (secretBytes) {
          handleHash(hmacSha1(secretBytes, new Uint8Array(buffer)));
        }
      });
    }

    function renderOtp(value) {
      otpDigits.textContent = padStart(value, 6, "-").slice(0, 6);
    }

    function update() {
      if (isUpdating) return;
      isUpdating = true;
      var unixTime = Math.floor(Date.now() / 1000);
      lastLocalUnix = unixTime;
      var secondsLeft = 30 - (unixTime % 30);
      remainingTag.textContent = secondsLeft;

      if (!cryptoKey && !secretBytes) {
        renderOtp("------");
        isUpdating = false;
        return;
      }

      generateOtp(unixTime)
        .then(function (otp) {
          renderOtp(otp || "------");
          isUpdating = false;
        })
        .catch(function () {
          renderOtp("------");
          isUpdating = false;
        });
    }

    function copyOtp() {
      var value = otpDigits.textContent.replace(/\s+/g, "");
      if (!value || value.indexOf("-") !== -1) return;
      navigator.clipboard
        .writeText(value)
        .catch(function () {})
        .then(function () {
          otpTag.classList.add("copied");
          setTimeout(function () {
            otpTag.classList.remove("copied");
          }, 1500);
        });
    }

    function fetchNetworkTime() {
      syncBtn.disabled = true;
      syncBtn.textContent = "...";
      fetch("https://worldtimeapi.org/api/ip", { cache: "no-store" })
        .then(function (response) {
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response.json();
        })
        .then(function (data) {
          var networkUnix = Math.floor(data.unixtime);
          var currentLocal = lastLocalUnix || Math.floor(Date.now() / 1000);
          var drift = currentLocal - networkUnix;
          var signed = drift > 0 ? "+" + drift : String(drift);
          driftTag.textContent = "Рассинхрон: " + signed + " сек";
        })
        .catch(function () {
          driftTag.textContent = "Рассинхрон: ошибка";
        })
        .finally(function () {
          syncBtn.disabled = false;
          syncBtn.textContent = "Проверить время";
        });
    }

    otpTag.addEventListener("click", copyOtp);

    secretInput.addEventListener("input", function (event) {
      var value = event.target.value.replace(/[^a-zA-Z2-7\s]/g, "").toUpperCase();
      event.target.value = value;
      updateUrlWithSecret(value);
      if (value === lastSecret) return;
      prepareKey(value).then(update);
    });

    syncBtn.addEventListener("click", fetchNetworkTime);

    var initialSecret = extractSecretFromUrl();
    if (initialSecret) {
      var normalized = initialSecret.toUpperCase();
      secretInput.value = normalized;
      updateUrlWithSecret(normalized);
      prepareKey(normalized).then(update);
    }

    setInterval(update, 1000);
    renderOtp("------");
    update();
  </script>
</body>
</html>
